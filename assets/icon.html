<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1B211E; }
  body { display: grid; place-items: center; }
  /* ~12% safe padding -> mark fills the middle ~76vmin */
  .mark { width: 76vmin; height: 76vmin; display: block; }
</style>
</head>
<body>
  <!-- field clipboard with a checked entry: the fieldform mark -->
  <svg class="mark" viewBox="0 0 32 32" aria-hidden="true">
    <rect x="8" y="6.5" width="16" height="20.5" rx="2.6" fill="#F4F1E8"/>
    <rect x="12" y="4.3" width="8" height="4" rx="2" fill="#C1471F"/>
    <path d="M11.4 16 l2.9 2.9 l5.3 -6" fill="none" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="11.4" y1="22" x2="20.6" y2="22" stroke="#D8D2C0" stroke-width="1.7" stroke-linecap="round"/>
  </svg>
</body>
</html>
